<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="ng1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ng2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Connection lines -->
  <line x1="22" y1="48" x2="64" y2="22" stroke="url(#ng1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="22" y1="80" x2="64" y2="106" stroke="url(#ng1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="22" x2="106" y2="48" stroke="url(#ng2)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="106" x2="106" y2="80" stroke="url(#ng2)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="22" x2="64" y2="106" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Nodes -->
  <circle cx="64" cy="22" r="10" fill="url(#ng2)"/>
  <circle cx="64" cy="106" r="10" fill="url(#ng2)"/>
  <circle cx="22" cy="48" r="10" fill="url(#ng1)"/>
  <circle cx="22" cy="80" r="10" fill="url(#ng1)"/>
  <circle cx="106" cy="48" r="10" fill="url(#ng1)"/>
  <circle cx="106" cy="80" r="10" fill="url(#ng1)"/>

  <!-- Center node (A) -->
  <circle cx="64" cy="64" r="16" fill="url(#ng1)"/>
  <text x="64" y="71" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
        font-size="22" font-weight="800" fill="white">A</text>
</svg>
