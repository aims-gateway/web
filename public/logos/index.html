<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMS Gateway — Logo Selection</title>
<link id="favicon" rel="icon" type="image/svg+xml" href="04-orbit-rings.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }
  .header {
    text-align: center;
    padding: 48px 24px 32px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header p {
    color: #94a3b8;
    font-size: 0.95rem;
  }
  .header .badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    background: rgba(99,102,241,0.15);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.25);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .card:hover {
    border-color: #6366f1;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(99,102,241,0.15);
  }
  .card.selected {
    border-color: #06b6d4;
    box-shadow: 0 0 0 2px #06b6d4, 0 8px 32px rgba(6,182,212,0.2);
  }
  .card.selected::after {
    content: "✓ Selected";
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 0.7rem;
    color: #06b6d4;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card .preview {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .card .preview .size-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .card .preview img { display: block; }
  .card .preview .label {
    font-size: 0.65rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card .name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #cbd5e1;
  }
  .card .desc {
    font-size: 0.72rem;
    color: #64748b;
    margin-top: 4px;
    line-height: 1.4;
  }

  .actions {
    position: sticky;
    bottom: 24px;
    max-width: 400px;
    margin: 40px auto 0;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .actions .info {
    font-size: 0.82rem;
    color: #94a3b8;
  }
  .actions .info strong {
    color: #e2e8f0;
  }
  .actions button {
    padding: 10px 22px;
    border-radius: 10px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-apply {
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    color: white;
  }
  .btn-apply:hover { opacity: 0.9; transform: scale(1.02); }
  .btn-reset {
    background: #334155;
    color: #94a3b8;
  }
  .btn-reset:hover { background: #475569; color: #e2e8f0; }

  .color-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }
  .color-bar .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .color-bar .dot.c1 { background: #6366f1; }
  .color-bar .dot.c2 { background: #8b5cf6; }
  .color-bar .dot.c3 { background: #06b6d4; }

  .footer-note {
    text-align: center;
    padding: 32px 0 16px;
    font-size: 0.78rem;
    color: #475569;
  }

  /* Toast notification */
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    color: white;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 600;
    z-index: 9999;
    animation: toastIn 0.25s ease;
    box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>AIMS Gateway — Logo Selection</h1>
  <p>20 vector SVG logos themed around AI Skills, Marketplace, and Gateway</p>
  <div class="badge">Click any card to select · Indigo → Cyan gradient scheme</div>
  <div class="color-bar">
    <div class="dot c1"></div><div class="dot c2"></div><div class="dot c3"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="actions" id="actions">
  <div class="info">
    Selected: <strong id="selected-name">—</strong>
  </div>
  <div>
    <button class="btn-reset" onclick="resetSelection()">Reset</button>
    <button class="btn-apply" onclick="applyLogo()">Use as favicon</button>
  </div>
</div>

<div class="footer-note">
  After selecting, run: <code style="color:#a5b4fc">cp web/public/logos/<span id="cmd-file">XX-name.svg</span> web/app/icon.svg</code>
</div>

<script>
const logos = [
  { file: "01-hex-portal.svg",       name: "Hex Portal",       desc: "六边形门户 + A — gateway 品牌核心" },
  { file: "02-node-network.svg",     name: "Node Network",     desc: "分布式节点网络 + 中心 A — AI 连接" },
  { file: "03-shield-crystal.svg",   name: "Shield Crystal",   desc: "盾形水晶 + 电路纹 — 安全可信" },
  { file: "04-orbit-rings.svg",      name: "Orbit Rings",      desc: "同心轨道 + 6 节点 — 极简流转" },
  { file: "05-diamond-facet.svg",    name: "Diamond Facet",    desc: "多层钻石切割 — 精准高品质" },
  { file: "06-puzzle-pieces.svg",    name: "Puzzle Pieces",    desc: "拼图块咬合 — marketplace 匹配" },
  { file: "07-lightning-bolt.svg",   name: "Lightning Bolt",   desc: "闪电 + 环形 — 高速 relay" },
  { file: "08-compass-star.svg",     name: "Compass Star",     desc: "指北星 — skill 发现导航" },
  { file: "09-stacked-layers.svg",   name: "Stacked Layers",   desc: "API 层叠卡片 — 多协议平台" },
  { file: "10-neural-brain.svg",     name: "Neural Brain",     desc: "简化神经网络 — AI 智能" },
  { file: "11-bridge-arch.svg",      name: "Bridge Arch",      desc: "拱桥 + 中心 A — relay 中继" },
  { file: "12-isometric-cube.svg",   name: "Isometric Cube",   desc: "等轴立方体 — Web3 / 区块链" },
  { file: "13-flame-torch.svg",      name: "Flame Torch",      desc: "火炬火焰 — 创新引擎" },
  { file: "14-crosshair-target.svg", name: "Crosshair Target", desc: "瞄准镜 + A — AIMS 精准" },
  { file: "15-dna-helix.svg",        name: "DNA Helix",        desc: "双螺旋演化 — 技能进化迭代" },
  { file: "16-gear-cog.svg",         name: "Gear Cog",         desc: "齿轮自动化 — skill 编排引擎" },
  { file: "17-star-badge.svg",       name: "Star Badge",       desc: "星形徽章 + A — 品质认证" },
  { file: "18-waveform-pulse.svg",   name: "Waveform Pulse",   desc: "信号波形 — 数据流 / API relay" },
  { file: "19-handshake.svg",        name: "Handshake",        desc: "握手 — 可信交易 / marketplace" },
  { file: "20-crown-gem.svg",        name: "Crown Gem",        desc: "冠冕宝石 — 高端 premium" },
];

let selected = null;

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = logos.map((l, i) => `
    <div class="card" id="card-${i}" onclick="selectLogo(${i})">
      <div class="preview">
        <div class="size-box">
          <img src="${l.file}" width="64" height="64" alt="${l.name}">
          <span class="label">64px</span>
        </div>
        <div class="size-box">
          <img src="${l.file}" width="32" height="32" alt="${l.name}">
          <span class="label">32px</span>
        </div>
        <div class="size-box">
          <img src="${l.file}" width="16" height="16" alt="${l.name}">
          <span class="label">16px</span>
        </div>
      </div>
      <div class="name">#${String(i+1).padStart(2,"0")} ${l.name}</div>
      <div class="desc">${l.desc}</div>
    </div>
  `).join("");
}

function selectLogo(i) {
  selected = i;
  document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
  document.getElementById("card-" + i).classList.add("selected");
  document.getElementById("selected-name").textContent = logos[i].name;
  document.getElementById("cmd-file").textContent = logos[i].file;

  // Update browser favicon in real-time
  document.getElementById("favicon").href = logos[i].file;

  // Update page title so the tab reflects the selection
  document.title = "AIMS — " + logos[i].name;

  // Toast notification
  showToast("Favicon updated — check your browser tab ↑");
}

function showToast(msg) {
  const existing = document.querySelector(".toast");
  if (existing) existing.remove();
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    if (t.parentNode) t.remove();
  }, 2000);
}

function resetSelection() {
  selected = null;
  document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
  document.getElementById("selected-name").textContent = "—";
  document.getElementById("cmd-file").textContent = "XX-name.svg";
  document.getElementById("favicon").href = "04-orbit-rings.svg";
  document.title = "AIMS Gateway — Logo Selection";
}

function applyLogo() {
  if (selected === null) {
    alert("Please click a logo card to select one first.");
    return;
  }
  const file = logos[selected].file;
  const msg = `To apply "${logos[selected].name}" as favicon, run:\n\ncp web/public/logos/${file} web/app/icon.svg`;
  document.getElementById("cmd-file").textContent = file;
  alert("Copy command (shown at bottom of page):\n\n" + msg);
}

renderGrid();
</script>
</body>
</html>
